<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="icon" href="portfav.svg" type="image/svg+xml">
  <title>Archive — Antonio Chen</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    a, span, p { text-decoration: none; }
    :root { --white: #ffffff; --black: #111111; --gray: #999999; --light-gray: #e8e8e8; }

    html, body {
      background: var(--white);
      color: var(--black);
      font-family: 'ABCMonumentGrotesk', sans-serif;
      -webkit-font-smoothing: antialiased;
    }

    /* ── SITE NAME ── */
    .site-name {
      position: fixed;
      top: 32px;
      left: 32px;
      z-index: 100;
      font-size: 11pt;
      font-weight: 500;
      letter-spacing: 0.01em;
      line-height: 1.2;
      color: var(--black);
      text-decoration: none;
    }

    /* ── NAV ── */
    .site-nav {
      position: fixed;
      top: 120px;
      left: 32px;
      z-index: 100;
      display: flex;
      flex-direction: column;
      gap: 3px;
    }

    .nav-link {
      font-size: 11pt;
      font-weight: 500;
      color: var(--black);
      text-decoration: underline;
      text-underline-offset: 2px;
      text-decoration-thickness: 1px;
      line-height: 1.2;
      transition: opacity 0.2s ease;
      display: block;
    }
    .nav-link:hover { opacity: 0.5; }

    .site-nav--sub {
      left: 160px;
    }

    .nav-link--gray {
      color: var(--black);
      text-decoration-color: var(--black);
    }

    /* ── LANG TOGGLE ── */
    .lang-toggle {
      position: fixed;
      top: 32px;
      right: 32px;
      z-index: 200;
      font-size: 11pt;
      font-weight: 500;
      color: var(--black);
      cursor: pointer;
      text-decoration: underline;
      text-underline-offset: 2px;
      text-decoration-thickness: 1px;
      transition: opacity 0.2s ease;
      background: none;
      border: none;
      font-family: 'ABCMonumentGrotesk', sans-serif;
      letter-spacing: 0.01em;
    }
    .lang-toggle:hover { opacity: 0.5; }

    /* ── CLOCK ── */
    .clock {
      position: fixed;
      bottom: 24px;
      right: 32px;
      z-index: 100;
      font-size: 10pt;
      font-weight: 500;
      color: var(--black);
      font-family: 'ABCMonumentGrotesk', sans-serif;
    }

    /* ── MAIN CONTENT ── */
    main {
      margin-left: 160px;
      padding: 80px 48px 80px 32px;
    }

    /* ── IMAGE GRID ── */
    .image-grid {
      display: none;
      flex-direction: column;
      align-items: center;
      gap: 16px;
    }
    .image-grid.visible {
      display: flex;
    }
    .image-grid img {
      width: 600px;
      height: auto;
      display: block;
    }

    @media (max-width: 768px) {
      main {
        margin-left: 0;
        padding: 120px 24px 80px;
      }
      .image-grid {
        grid-template-columns: repeat(2, 1fr);
      }
    }
  </style>
  <style>
    @font-face {
      font-family: 'ABCMonumentGrotesk';
      src: url('ABCMonumentGrotesk-Light-Trial.otf') format('opentype');
      font-weight: 400;

    }
    @font-face {

    @font-face {

<script>
  const dailyLink = document.getElementById('dailyLink');
  const dailyGrid = document.getElementById('dailyGrid');
  const olyLink = document.getElementById('olyLink');
  const olyGrid = document.getElementById('olyGrid');

  function activate(link, grid) {
    [dailyGrid, olyGrid].forEach(g => g.classList.remove('visible'));
    grid.classList.add('visible');
    window.scrollTo(0, 0);
  }

  dailyLink.addEventListener('click', (e) => { e.preventDefault(); activate(dailyLink, dailyGrid); });
  olyLink.addEventListener('click', (e) => { e.preventDefault(); activate(olyLink, olyGrid); });

  // Clock
  function updateClock() {
    const now = new Date();
    const h = String(now.getHours()).padStart(2, '0');
    const m = String(now.getMinutes()).padStart(2, '0');
    const s = String(now.getSeconds()).padStart(2, '0');
    document.getElementById('clock').textContent = h + ':' + m + ':' + s;
  }
  updateClock();
  setInterval(updateClock, 1000);

  // Language toggle
  const toggle = document.getElementById('langToggle');
  if (toggle) {
    let isZh = false;
    toggle.addEventListener('click', () => {
      isZh = !isZh;
      toggle.textContent = isZh ? 'EN' : '中文';
      document.querySelectorAll('[data-en]').forEach(el => {
        el.innerHTML = isZh ? el.dataset.zh : el.dataset.en;
      });
    });
  }
</script>
